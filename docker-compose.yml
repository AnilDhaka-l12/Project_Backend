version: '3.8'

services:
  # Redis Service
  redis:
    image: redis:7.2-alpine
    container_name: projectbackend_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network

  # .NET Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projectbackend_app
    restart: unless-stopped
    ports:
      - "5082:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_ENVIRONMENT=Docker
      - REDIS__CONNECTIONSTRING=redis:6379,abortConnect=False
      - REDIS__INSTANCENAME=MyAppCache
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-service-account.json
      # Remove Backblaze environment variables - use appsettings.json instead
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge

volumes:
  redis_data:
    driver: local