name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --verbosity normal

      - name: Publish application
        run: dotnet publish --configuration Release --output ./publish

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-app
          path: ./publish
          retention-days: 3

      # Explicit Docker login using PAT
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: Verify Docker login
        run: docker info

      # Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            pravij07/projectbackend:staging
            pravij07/projectbackend:${{ github.sha }}
          build-args: |
            JWT_KEY=${{ secrets.JWT_KEY }}
            ISSUER=${{ secrets.ISSUER }}
            AUDIENCE=${{ secrets.AUDIENCE }}
            REDIS_CONNECTIONSTRING=${{ secrets.REDIS_CONNECTIONSTRING }}
            REDIS_INSTANCENAME=${{ secrets.REDIS_INSTANCENAME }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_LOGIN=${{ secrets.EMAIL_LOGIN }}
            EMAIL_KEY=${{ secrets.EMAIL_KEY }}
            PROJECTID=${{ secrets.PROJECTID }}
            CREDENTIALSPATH=/app/firebase-service-account.json
            BACKBLAZESETTINGS_ACCESSKEY=${{ secrets.BACKBLAZESETTINGS_ACCESSKEY }}
            BACKBLAZESETTINGS_SECRETKEY=${{ secrets.BACKBLAZESETTINGS_SECRETKEY }}
            BACKBLAZESETTINGS_ENDPOINTURL=${{ secrets.BACKBLAZESETTINGS_ENDPOINTURL }}
            BACKBLAZESETTINGS_BUCKETNAME=${{ secrets.BACKBLAZESETTINGS_BUCKETNAME }}

      # Deploy to staging server
      - name: Deploy to Staging Server
        run: |
          echo "Deploying Docker image to staging server"
          ssh user@staging-server "docker pull pravij7/projectbackend:staging && docker-compose -f docker-compose.prod.yml up -d backend-staging"
          echo "Staging deployment complete"

      # Run smoke tests
      - name: Run smoke tests on staging
        run: |
          curl -f https://staging.yourdomain.com/health || exit 1
          echo "Smoke tests passed"
