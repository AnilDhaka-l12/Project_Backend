name: CI - Validate Production PR

on:
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'
      
      - name: Install dotnet format
        run: dotnet tool install -g dotnet-format
      
      - name: Find and build solution/project
        shell: bash
        run: |
          # Find first .sln or .csproj file
          if ls *.sln 2>/dev/null | head -1; then
            PROJECT_FILE=$(ls *.sln | head -1)
          else
            PROJECT_FILE=$(ls *.csproj | head -1)
          fi
          
          echo "Building: $PROJECT_FILE"
          dotnet restore "$PROJECT_FILE"
          dotnet build "$PROJECT_FILE" --no-restore --configuration Release
          dotnet format --verify-no-changes "$PROJECT_FILE"