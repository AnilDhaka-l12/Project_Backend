name: CI - Validate Production PR

on:
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'
      
      - name: Install dotnet format
        run: dotnet tool install -g dotnet-format
      
      - name: Find solution file
        id: sln
        run: echo "sln_file=$(find . -maxdepth 1 -name '*.sln' -printf '%f')" >> $GITHUB_OUTPUT
      
      - name: Restore dependencies
        run: dotnet restore ${{ steps.sln.outputs.sln_file }}
      
      - name: Build
        run: dotnet build ${{ steps.sln.outputs.sln_file }} --no-restore --configuration Release
      
      - name: Check code formatting
        run: dotnet format --verify-no-changes ${{ steps.sln.outputs.sln_file }}