name: CI - Validate Production PR

on:
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'
      
      - name: Install dotnet format
        run: dotnet tool install -g dotnet-format
      
      - name: Restore dependencies
        run: dotnet restore Project_Backend.sln
      
      - name: Build
        run: dotnet build Project_Backend.sln --no-restore --configuration Release
      
      - name: Run tests
        run: dotnet test Project_Backend.sln --no-build --verbosity normal
      
      - name: Check code formatting
        run: dotnet format --verify-no-changes Project_Backend.sln