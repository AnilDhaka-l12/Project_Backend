name: 03 - Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'
      
      - name: Build and publish
        run: |
          dotnet restore
          dotnet build --configuration Release
          dotnet publish --configuration Release --output ./publish
      
      - name: Start application
        run: |
          dotnet ./publish/projectBackend.dll --urls=http://localhost:5082 &
          sleep 15
      
      - name: Check if application is running
        run: |
          echo "🔍 Checking if application process is running..."
          pgrep -f "projectBackend.dll" || exit 1
          echo "✅ Application is running"
      
      - name: Check if endpoints are accessible
        run: |
          echo "🏥 Testing endpoints..."
          
          # Check Redis endpoint
          curl -f http://localhost:5082/api/RedisTest/check/test && echo "✅ Redis endpoint OK" || echo "❌ Redis endpoint failed"
          
          # Check AdminLogin endpoint
          curl -f http://localhost:5082/api/AdminLogin && echo "✅ AdminLogin endpoint OK" || echo "❌ AdminLogin endpoint failed"
          
          # Check Users endpoint
          curl -f http://localhost:5082/api/Users && echo "✅ Users endpoint OK" || echo "❌ Users endpoint failed"
          
          echo "✅ All endpoints are accessible"