name: 03 - Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'
      
      - name: Build and publish
        run: |
          dotnet restore
          dotnet build --configuration Release
          dotnet publish --configuration Release --output ./publish
      
      - name: Start application
        run: |
          dotnet ./publish/projectBackend.dll &
          sleep 15
      
      - name: Health check verification
        run: |
          echo "🏥 Verifying API health..."
          curl -f http://localhost:5000/health || exit 1
          curl -f http://localhost:5000/api/RedisTest/health || exit 1
      
      - name: Install Newman
        if: success()
        run: npm install -g newman
      
      - name: Check if Postman files exist
        id: check-files
        run: |
          if [ -f "tests/postman/collection.json" ] && [ -f "tests/postman/environment.json" ]; then
            echo "files_exist=true" >> $GITHUB_OUTPUT
          else
            echo "files_exist=false" >> $GITHUB_OUTPUT
            echo "⚠️ Postman files not found, skipping Newman tests"
          fi
      
      - name: Run Newman tests
        if: steps.check-files.outputs.files_exist == 'true'
        run: |
          newman run tests/postman/collection.json \
            --environment tests/postman/environment.json \
            --reporters cli,json,html \
            --reporter-json-export newman-report.json \
            --reporter-html-export newman-report.html \
            --timeout-request 30000
      
      - name: Upload Newman reports
        if: steps.check-files.outputs.files_exist == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: |
            newman-report.json
            newman-report.html
          retention-days: 7
