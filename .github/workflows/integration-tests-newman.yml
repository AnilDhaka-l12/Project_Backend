name: 03 - Newman Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'
      
      - name: Build and publish
        run: |
          dotnet restore
          dotnet build --configuration Release
          dotnet publish --configuration Release --output ./publish
      
      - name: Start application
        run: |
          dotnet ./publish/projectBackend.dll &
          sleep 15
      
      - name: Install Newman
        run: npm install -g newman
      
      - name: Run full collection
        run: |
          newman run tests/postman/collection.json \
            --environment tests/postman/environment.json \
            --reporters cli,json,html \
            --reporter-json-export newman-report.json \
            --reporter-html-export newman-report.html \
            --timeout-request 30000
      
      - name: Run specific test folders
        run: |
          newman run tests/postman/collection.json \
            --folder "Authentication" \
            --folder "User Management" \
            --folder "Redis Operations"
      
      - name: Run data-driven tests
        run: |
          newman run tests/postman/collection.json \
            --iteration-data tests/postman/test-data.csv \
            --iterations 10
      
      - name: Upload Newman reports
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: |
            newman-report.json
            newman-report.html
          retention-days: 7
      
      - name: Health check verification
        run: |
          echo "🏥 Verifying API health..."
          curl -f http://localhost:5000/health || exit 1
          curl -f http://localhost:5000/api/RedisTest/health || exit 1
      
      - name: Fail on test failures
        if: failure()
        run: |
          echo "❌ Integration tests failed!"
          exit 1