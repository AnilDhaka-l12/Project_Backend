name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    concurrency: production

    steps:
      # Step 1: Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'

      # Step 3: Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # Step 4: Build
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Step 5: Run tests
      - name: Run tests
        run: dotnet test --no-build --verbosity normal

      # Step 6: Publish application
      - name: Publish application
        run: dotnet publish --configuration Release --output ./publish

      # Step 7: Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-app
          path: ./publish
          retention-days: 7

      # Step 8: Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Step 9: Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            pravij07/projectbackend:production
            pravij07/projectbackend:${{ github.sha }}
          build-args: |
            JWT_KEY=${{ secrets.JWT_KEY }}
            ISSUER=${{ secrets.ISSUER }}
            AUDIENCE=${{ secrets.AUDIENCE }}
            REDIS_CONNECTIONSTRING=${{ secrets.REDIS_CONNECTIONSTRING }}
            REDIS_INSTANCENAME=${{ secrets.REDIS_INSTANCENAME }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_LOGIN=${{ secrets.EMAIL_LOGIN }}
            EMAIL_KEY=${{ secrets.EMAIL_KEY }}
            PROJECTID=${{ secrets.PROJECTID }}
            CREDENTIALSPATH=/app/firebase-service-account.json
            BACKBLAZESETTINGS_ACCESSKEY=${{ secrets.BACKBLAZESETTINGS_ACCESSKEY }}
            BACKBLAZESETTINGS_SECRETKEY=${{ secrets.BACKBLAZESETTINGS_SECRETKEY }}
            BACKBLAZESETTINGS_ENDPOINTURL=${{ secrets.BACKBLAZESETTINGS_ENDPOINTURL }}
            BACKBLAZESETTINGS_BUCKETNAME=${{ secrets.BACKBLAZESETTINGS_BUCKETNAME }}

      # Step 10: Deploy Docker image to production server
      - name: Deploy to Production Server
        run: |
          echo "Deploying Docker image to production server"
          ssh user@production-server "docker pull pravij07/projectbackend:production && docker-compose -f docker-compose.prod.yml up -d backend-production"
          echo "Production deployment complete"

      # Step 11: Verify production deployment
      - name: Verify production deployment
        run: |
          curl -f https://yourdomain.com/health || exit 1
          echo "Production verification passed"