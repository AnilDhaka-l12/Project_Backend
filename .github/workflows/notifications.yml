name: Notifications

on:
  push:
    branches: [main]  # Changed from master to main
  pull_request:
    branches: [main]  # Changed from master to main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'
      
      - name: Restore dependencies
        run: dotnet restore Project_Backend.sln
      
      - name: Build
        run: dotnet build Project_Backend.sln --no-restore --configuration Release
      
      - name: Publish
        run: dotnet publish Project_Backend.sln --configuration Release --output ./publish
      
      - name: Discord Success Notification
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: ".NET Build Successful"
          description: |
            **Project:** ${{ github.repository }}
            **Commit:** `${{ github.sha }}`
            **Author:** ${{ github.actor }}
            **Branch:** ${{ github.ref_name }}
          color: 0x00ff00

      - name: Discord Failure Notification
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: ".NET Build Failed"
          description: |
            **Project:** ${{ github.repository }}
            **Failed Commit:** `${{ github.sha }}`
            **Author:** ${{ github.actor }}
            **Branch:** ${{ github.ref_name }}
            
            🔗 [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: 0xff0000